<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fishing Interactive Website</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/animations.css" />
  <style>
    /* Extra styles that Tailwind CDN can't express as utilities */
    #water-area {
      background: linear-gradient(180deg, #0ea5e9 0%, #0369a1 40%, #075985 100%);
    }
    #water-surface {
      background: linear-gradient(180deg, rgba(186,230,253,0.6) 0%, rgba(125,211,252,0.3) 100%);
    }
    #sky-area {
      background: linear-gradient(180deg, #bae6fd 0%, #7dd3fc 60%, #38bdf8 100%);
    }
    #ground-area {
      background: linear-gradient(180deg, #a3a08a 0%, #c4b97a 40%, #d4a857 100%);
    }
    #bobber {
      width: 18px;
      height: 18px;
      background: radial-gradient(circle at 35% 35%, #f87171, #dc2626);
      border-radius: 50%;
      border: 2px solid white;
    }
    #hook {
      width: 10px;
      height: 16px;
      border: 2px solid #9ca3af;
      border-top: none;
      border-radius: 0 0 8px 8px;
    }
    #rod {
      width: 6px;
      height: 80px;
      background: linear-gradient(180deg, #78350f, #a16207);
      border-radius: 3px;
      transform: rotate(-30deg);
      transform-origin: bottom center;
    }
    /* Inventory scroll */
    #inventory-list {
      max-height: calc(100vh - 160px);
      overflow-y: auto;
    }
    /* Ripple element styling */
    .ripple-circle {
      position: absolute;
      width: 40px;
      height: 40px;
      border: 2px solid rgba(186,230,253,0.7);
      border-radius: 50%;
      transform: scale(0);
      pointer-events: none;
    }
    /* Cloud element styling */
    .cloud-element {
      position: absolute;
      pointer-events: none;
      font-size: 1.5rem;
      opacity: 0.8;
      white-space: nowrap;
    }
  </style>
</head>
<body class="overflow-hidden bg-sky-200 font-sans select-none">

  <!-- ============================================================
       HUD BAR — fixed top, full width, z-50
       ============================================================ -->
  <header
    id="hud-bar"
    class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between
           px-3 py-1.5 sm:px-4 sm:py-2
           bg-sky-900/80 backdrop-blur-sm text-white shadow-lg"
  >
    <!-- Mute toggle -->
    <button
      id="btn-mute"
      aria-label="Toggle mute"
      class="flex items-center justify-center w-8 h-8 sm:w-9 sm:h-9
             rounded-full bg-sky-700 hover:bg-sky-600 active:scale-95
             transition-all duration-150 focus:outline-none focus:ring-2
             focus:ring-sky-400"
    >
      <span id="mute-icon" class="text-base sm:text-lg" aria-hidden="true">🔊</span>
    </button>

    <!-- Centre: score + fish count -->
    <div class="flex items-center gap-3 sm:gap-5 text-sm sm:text-base font-semibold">
      <span
        id="score-display"
        class="bg-sky-800/60 px-2 py-0.5 rounded-md tabular-nums"
        aria-live="polite"
        aria-label="Skor"
      >Skor: 0</span>

      <span
        id="fish-count"
        class="bg-sky-800/60 px-2 py-0.5 rounded-md tabular-nums"
        aria-live="polite"
        aria-label="Jumlah ikan"
      >🐟 0</span>
    </div>

    <!-- Timer -->
    <div
      id="timer-display"
      class="bg-sky-800/60 px-2.5 py-0.5 rounded-md text-sm sm:text-base
             font-bold tabular-nums min-w-[4rem] text-center"
      aria-live="assertive"
      aria-label="Timer"
    >⏱ 60</div>
  </header>


  <!-- ============================================================
       MAIN GAME AREA — full height flex-col (below HUD)
       ============================================================ -->
  <main
    id="game-area"
    class="flex flex-col w-full h-screen pt-10 sm:pt-11"
    aria-label="Area permainan"
  >

    <!-- ----------------------------------------------------------
         SKY AREA  (~25vh)  — clouds/birds injected by JS
         ---------------------------------------------------------- -->
    <section
      id="sky-area"
      class="relative overflow-hidden flex-none"
      style="height: 25vh;"
      aria-label="Langit"
    >
      <!-- Cloud/bird elements generated by Renderer.renderBackgroundAnimations() go here -->
    </section>


    <!-- ----------------------------------------------------------
         WATER AREA  (~50vh)  — bobber, hook, ripples
         ---------------------------------------------------------- -->
    <section
      id="water-area"
      class="relative overflow-hidden flex-none"
      style="height: 50vh;"
      aria-label="Air"
    >
      <!-- Decorative water surface band -->
      <div
        id="water-surface"
        class="absolute top-0 left-0 right-0 h-6 sm:h-8"
        aria-hidden="true"
      ></div>

      <!-- Ripple overlay — ripple divs injected by Renderer.startWaterRipples() -->
      <div
        id="ripple-container"
        class="absolute inset-0 pointer-events-none overflow-hidden"
        aria-hidden="true"
      ></div>

      <!-- Bobber — absolutely positioned, moved by JS -->
      <div
        id="bobber"
        class="absolute hidden"
        style="top: 30%; left: 50%; transform: translate(-50%, -50%);"
        aria-hidden="true"
      ></div>

      <!-- Hook — absolutely positioned, moved by JS during cast/reel animations -->
      <div
        id="hook"
        class="absolute hidden"
        style="top: 30%; left: 50%; transform: translate(-50%, -50%);"
        aria-hidden="true"
      ></div>

      <!-- Notification div — floating catch/miss text, injected by JS -->
      <div
        id="notification"
        class="absolute left-1/2 -translate-x-1/2 pointer-events-none z-20
               text-white font-bold text-lg sm:text-xl drop-shadow-lg"
        style="top: 20%;"
        aria-live="assertive"
        aria-atomic="true"
      ></div>
    </section>


    <!-- ----------------------------------------------------------
         GROUND AREA  (~25vh)  — rod, cast/reel buttons
         ---------------------------------------------------------- -->
    <section
      id="ground-area"
      class="relative flex-none flex flex-col items-center justify-center gap-3 sm:gap-4 pb-2"
      style="height: 25vh;"
      aria-label="Daratan"
    >
      <!-- Rod visual -->
      <div
        id="rod"
        class="absolute left-6 sm:left-10 bottom-6 sm:bottom-8"
        aria-hidden="true"
      ></div>

      <!-- Action buttons row -->
      <div class="flex items-center gap-4 sm:gap-6 z-10">
        <!-- Cast button -->
        <button
          id="btn-cast"
          class="flex items-center gap-2 px-5 py-2.5 sm:px-7 sm:py-3
                 rounded-2xl text-base sm:text-lg font-bold
                 bg-blue-500 hover:bg-blue-400 active:scale-95
                 text-white shadow-lg shadow-blue-900/40
                 transition-all duration-150
                 focus:outline-none focus:ring-4 focus:ring-blue-300
                 disabled:opacity-50 disabled:cursor-not-allowed disabled:scale-100"
          aria-label="Lempar kail"
        >
          🎣 Cast!
        </button>

        <!-- Reel button — hidden initially -->
        <button
          id="btn-reel"
          class="hidden items-center gap-2 px-5 py-2.5 sm:px-7 sm:py-3
                 rounded-2xl text-base sm:text-lg font-bold
                 bg-emerald-500 hover:bg-emerald-400 active:scale-95
                 text-white shadow-lg shadow-emerald-900/40
                 transition-all duration-150
                 focus:outline-none focus:ring-4 focus:ring-emerald-300
                 disabled:opacity-50 disabled:cursor-not-allowed disabled:scale-100"
          aria-label="Tarik kail"
        >
          🎣 Reel!
        </button>
      </div>
    </section>

  </main><!-- /#game-area -->


  <!-- ============================================================
       INVENTORY PANEL
       Sidebar on lg+, collapsible bottom panel on smaller screens
       ============================================================ -->
  <aside
    id="inventory-panel"
    class="
      fixed bottom-0 left-0 right-0 z-40
      bg-amber-50/95 backdrop-blur-sm border-t-2 border-amber-300
      transition-transform duration-300
      lg:top-10 lg:right-0 lg:bottom-0 lg:left-auto
      lg:w-64 xl:w-72
      lg:border-t-0 lg:border-l-2
      lg:translate-y-0
      "
    aria-label="Panel inventori"
  >
    <!-- Panel header / toggle handle -->
    <div
      class="flex items-center justify-between px-4 py-2 bg-amber-200
             lg:rounded-none cursor-pointer lg:cursor-default"
      id="inventory-header"
      role="button"
      tabindex="0"
      aria-expanded="false"
      aria-controls="inventory-list"
    >
      <h2 class="font-bold text-amber-900 text-sm sm:text-base">🎒 Inventori</h2>
      <span
        id="inventory-toggle-icon"
        class="text-amber-700 lg:hidden text-xs font-semibold"
        aria-hidden="true"
      >▲ buka</span>
    </div>

    <!-- Inventory list -->
    <ul
      id="inventory-list"
      class="divide-y divide-amber-200 overflow-y-auto
             hidden lg:block
             text-xs sm:text-sm text-amber-950"
      aria-label="Daftar ikan tertangkap"
    >
      <!-- Inventory rows injected by Renderer.updateInventoryPanel() -->
      <!-- Example row structure (generated by JS):
      <li class="flex items-center gap-2 px-3 py-2">
        <span class="text-xl">🐟</span>
        <span class="flex-1 font-medium">Ikan Mujair</span>
        <span class="text-green-600 font-semibold text-xs px-1 rounded bg-green-100">common</span>
        <span class="text-sky-700 font-bold text-xs">+10 pts</span>
      </li>
      -->
    </ul>

    <!-- Empty state placeholder -->
    <p
      id="inventory-empty"
      class="px-4 py-6 text-center text-amber-600 text-xs sm:text-sm italic
             lg:block hidden"
    >Belum ada ikan ditangkap.</p>
  </aside>


  <!-- ============================================================
       START SCREEN OVERLAY
       ============================================================ -->
  <div
    id="screen-start"
    class="fixed inset-0 z-50 flex items-center justify-center
           bg-sky-900/70 backdrop-blur-sm"
    role="dialog"
    aria-modal="true"
    aria-labelledby="start-title"
  >
    <div
      class="bg-white rounded-3xl shadow-2xl px-8 py-10 sm:px-12 sm:py-12
             flex flex-col items-center gap-4 sm:gap-5
             max-w-xs sm:max-w-sm w-full mx-4"
    >
      <!-- Title -->
      <h1
        id="start-title"
        class="text-3xl sm:text-4xl font-extrabold text-sky-700 text-center"
      >🎣 Fishing Game</h1>

      <!-- Subtitle -->
      <p class="text-sm sm:text-base text-sky-500 text-center leading-relaxed">
        Lempar kailmu, tunggu ikan menggigit,<br>dan tarik sebelum waktu habis!
      </p>

      <!-- Decorative divider -->
      <div class="w-16 h-1 rounded-full bg-sky-200"></div>

      <!-- Game info chips -->
      <div class="flex items-center gap-3 text-xs sm:text-sm text-gray-500">
        <span class="bg-sky-100 text-sky-700 rounded-full px-3 py-1 font-medium">⏱ 60 detik</span>
        <span class="bg-green-100 text-green-700 rounded-full px-3 py-1 font-medium">🐟 6 jenis ikan</span>
      </div>

      <!-- Start button -->
      <button
        id="btn-start"
        class="mt-2 w-full py-3 sm:py-3.5 rounded-2xl
               bg-sky-500 hover:bg-sky-400 active:scale-95
               text-white font-bold text-base sm:text-lg
               shadow-md shadow-sky-300
               transition-all duration-150
               focus:outline-none focus:ring-4 focus:ring-sky-300"
        aria-label="Mulai permainan"
      >
        Mulai Mancing
      </button>
    </div>
  </div>


  <!-- ============================================================
       RESULT SCREEN OVERLAY — hidden initially
       ============================================================ -->
  <div
    id="screen-result"
    class="fixed inset-0 z-50 hidden items-center justify-center
           bg-sky-900/70 backdrop-blur-sm"
    role="dialog"
    aria-modal="true"
    aria-labelledby="result-title"
  >
    <div
      class="bg-white rounded-3xl shadow-2xl px-6 py-8 sm:px-10 sm:py-10
             flex flex-col items-center gap-4 sm:gap-5
             max-w-sm sm:max-w-md w-full mx-4
             max-h-[90vh] overflow-y-auto"
    >
      <!-- Result title -->
      <h2
        id="result-title"
        class="text-2xl sm:text-3xl font-extrabold text-sky-700 text-center"
      >🏆 Hasil Mancing</h2>

      <!-- Score stats row -->
      <div class="w-full grid grid-cols-2 gap-3">
        <!-- Final score -->
        <div class="bg-sky-50 rounded-xl p-3 text-center">
          <p class="text-xs text-sky-500 font-medium uppercase tracking-wide">Skor Akhir</p>
          <p
            id="result-score"
            class="text-2xl sm:text-3xl font-extrabold text-sky-700 mt-0.5 tabular-nums"
          >0</p>
        </div>

        <!-- Fish caught -->
        <div class="bg-teal-50 rounded-xl p-3 text-center">
          <p class="text-xs text-teal-500 font-medium uppercase tracking-wide">Ikan Ditangkap</p>
          <p
            id="result-fish-count"
            class="text-2xl sm:text-3xl font-extrabold text-teal-700 mt-0.5 tabular-nums"
          >0</p>
        </div>
      </div>

      <!-- High score -->
      <div class="w-full bg-yellow-50 border border-yellow-200 rounded-xl px-4 py-2.5
                  flex items-center justify-between">
        <span class="text-xs sm:text-sm text-yellow-600 font-semibold">🥇 Skor Tertinggi</span>
        <span
          id="result-high-score"
          class="text-base sm:text-lg font-extrabold text-yellow-700 tabular-nums"
        >0</span>
      </div>

      <!-- Inventory summary -->
      <div class="w-full">
        <h3 class="text-xs sm:text-sm font-bold text-gray-500 uppercase tracking-wide mb-2">
          Daftar Tangkapan
        </h3>
        <ul
          id="result-inventory"
          class="divide-y divide-gray-100 rounded-xl border border-gray-200
                 max-h-40 overflow-y-auto text-xs sm:text-sm text-gray-800"
          aria-label="Ringkasan inventori"
        >
          <!-- Rows injected by Renderer.showResultScreen() -->
        </ul>
      </div>

      <!-- Restart button -->
      <button
        id="btn-restart"
        class="mt-1 w-full py-3 sm:py-3.5 rounded-2xl
               bg-sky-500 hover:bg-sky-400 active:scale-95
               text-white font-bold text-base sm:text-lg
               shadow-md shadow-sky-300
               transition-all duration-150
               focus:outline-none focus:ring-4 focus:ring-sky-300"
        aria-label="Main lagi"
      >
        Main Lagi
      </button>
    </div>
  </div>


  <!-- ============================================================
       SCRIPTS
       ============================================================ -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
