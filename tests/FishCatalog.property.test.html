<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Test — Weighted Random Selects a Valid Fish</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 780px;
      margin: 40px auto;
      padding: 0 20px;
      background: #0f172a;
      color: #e2e8f0;
    }
    h1 { color: #38bdf8; margin-bottom: 4px; }
    .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 28px; }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-right: 6px;
    }
    .badge-info  { background: #1e40af; color: #bfdbfe; }
    .badge-pass  { background: #14532d; color: #86efac; }
    .badge-fail  { background: #7f1d1d; color: #fca5a5; }
    .badge-run   { background: #78350f; color: #fde68a; }

    .card {
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 18px 22px;
      margin-bottom: 16px;
      background: #1e293b;
    }
    .card h2 { margin: 0 0 6px; font-size: 1rem; color: #f1f5f9; }
    .card .meta { font-size: 0.8rem; color: #64748b; margin-bottom: 12px; }
    .result-line {
      font-size: 0.85rem;
      padding: 6px 10px;
      border-radius: 6px;
      margin-top: 8px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .result-pass { background: #052e16; color: #86efac; border-left: 3px solid #22c55e; }
    .result-fail { background: #450a0a; color: #fca5a5; border-left: 3px solid #ef4444; }
    .result-info { background: #172554; color: #93c5fd; border-left: 3px solid #3b82f6; }

    #summary {
      font-size: 1.05rem;
      padding: 14px 20px;
      border-radius: 10px;
      margin-bottom: 28px;
      font-weight: 600;
    }
    #summary.pending { background: #1c1917; color: #d6d3d1; border: 1px solid #44403c; }
    #summary.running { background: #1c1400; color: #fde68a; border: 1px solid #78350f; }
    #summary.all-pass { background: #052e16; color: #86efac; border: 1px solid #166534; }
    #summary.has-fail { background: #450a0a; color: #fca5a5; border: 1px solid #991b1b; }

    pre { margin: 0; }
    button {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      background: #0ea5e9;
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #38bdf8; }
    button:disabled { background: #334155; color: #64748b; cursor: default; }
  </style>
</head>
<body>
  <h1>🎣 Property Test</h1>
  <p class="subtitle">
    <span class="badge badge-info">Property 9</span>
    Weighted Random Selects a Valid Fish &nbsp;·&nbsp;
    <span class="badge badge-info">Validates: Req 5.2</span>
  </p>

  <div id="summary" class="pending">⏳ Ready — click "Run Tests" to start.</div>

  <button id="btn-run" onclick="runTests()">▶ Run Tests</button>

  <div id="results" style="margin-top:24px;"></div>

  <!-- fast-check UMD bundle — exposes global `fc` -->
  <script src="https://cdn.jsdelivr.net/npm/fast-check/lib/bundle/fast-check.min.js"></script>

  <script type="module">
    // ── Import the module under test ─────────────────────────────────────────
    import { FISH_CATALOG, selectFish } from '../js/FishCatalog.js';

    // Expose to the inline onclick handler (module scope is private)
    window.__fishTest = { FISH_CATALOG, selectFish };
  </script>

  <script>
    // ── Tiny test-result renderer ─────────────────────────────────────────────
    const resultsEl  = document.getElementById('results');
    const summaryEl  = document.getElementById('summary');
    const btnRun     = document.getElementById('btn-run');

    let passCount = 0;
    let failCount = 0;

    function renderCard(title, meta, lines) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML =
        `<h2>${title}</h2><div class="meta">${meta}</div>` +
        lines.map(l => `<div class="result-line result-${l.type}"><pre>${l.text}</pre></div>`).join('');
      resultsEl.appendChild(card);
    }

    function updateSummary() {
      if (failCount === 0) {
        summaryEl.className = 'all-pass';
        summaryEl.textContent =
          `✅ All ${passCount} assertion group(s) passed — Property 9 holds for 200 runs.`;
      } else {
        summaryEl.className = 'has-fail';
        summaryEl.textContent =
          `❌ ${failCount} assertion group(s) failed, ${passCount} passed.`;
      }
    }

    // ── Main test runner (called by the button) ──────────────────────────────
    async function runTests() {
      // Wait until the ES module has loaded and exposed __fishTest
      if (!window.__fishTest) {
        // Retry once in 300 ms (module might still be loading)
        await new Promise(r => setTimeout(r, 300));
        if (!window.__fishTest) {
          summaryEl.className = 'has-fail';
          summaryEl.textContent =
            '❌ Module load failed — check the browser console for import errors.';
          return;
        }
      }

      btnRun.disabled = true;
      summaryEl.className = 'running';
      summaryEl.textContent = '⏳ Running property tests…';
      resultsEl.innerHTML = '';
      passCount = 0;
      failCount = 0;

      const { FISH_CATALOG, selectFish } = window.__fishTest;

      // ── Helper: run one fc.assert and capture the result ─────────────────
      function runProperty(title, meta, property, opts = {}) {
        try {
          fc.assert(property, { numRuns: 200, ...opts });
          passCount++;
          renderCard(title, meta, [
            { type: 'pass', text: `✓ PASSED — 200 runs, no counterexample found.` },
          ]);
        } catch (err) {
          failCount++;
          renderCard(title, meta, [
            { type: 'fail', text: `✗ FAILED\n${err.message}` },
          ]);
        }
      }

      // ════════════════════════════════════════════════════════════════════
      // Property 9a — selectFish returns a non-null, non-undefined value
      //               for any non-empty subset of the full catalog.
      // ════════════════════════════════════════════════════════════════════
      runProperty(
        'Property 9a — Result is never null or undefined',
        'Validates: Requirements 5.2 &nbsp;|&nbsp; Runs: 200 &nbsp;|&nbsp; Inputs: arbitrary non-empty subsets of FISH_CATALOG',
        fc.property(
          // Generate a non-empty subset: pick 1–N indices from the catalog
          fc.uniqueArray(
            fc.integer({ min: 0, max: FISH_CATALOG.length - 1 }),
            { minLength: 1, maxLength: FISH_CATALOG.length }
          ),
          (indices) => {
            const subset = indices.map(i => FISH_CATALOG[i]);
            const result = selectFish(subset);
            if (result === null || result === undefined) {
              throw new Error(
                `selectFish returned ${result} for subset of size ${subset.length}`
              );
            }
          }
        )
      );

      // ════════════════════════════════════════════════════════════════════
      // Property 9b — selectFish returns a member that actually exists in
      //               the supplied subset (identity check by object reference
      //               AND by id).
      // ════════════════════════════════════════════════════════════════════
      runProperty(
        'Property 9b — Result is a member of the supplied subset (by id)',
        'Validates: Requirements 5.2 &nbsp;|&nbsp; Runs: 200 &nbsp;|&nbsp; Inputs: arbitrary non-empty subsets of FISH_CATALOG',
        fc.property(
          fc.uniqueArray(
            fc.integer({ min: 0, max: FISH_CATALOG.length - 1 }),
            { minLength: 1, maxLength: FISH_CATALOG.length }
          ),
          (indices) => {
            const subset = indices.map(i => FISH_CATALOG[i]);
            const result = selectFish(subset);
            const ids = subset.map(f => f.id);
            if (!ids.includes(result.id)) {
              throw new Error(
                `selectFish returned fish with id "${result.id}" which is NOT in the subset ` +
                `[${ids.join(', ')}]`
              );
            }
          }
        )
      );

      // ════════════════════════════════════════════════════════════════════
      // Property 9c — selectFish works correctly for a single-item catalog
      //               (must always return that one fish).
      // ════════════════════════════════════════════════════════════════════
      runProperty(
        'Property 9c — Single-item catalog always returns that one fish',
        'Validates: Requirements 5.2 &nbsp;|&nbsp; Runs: 200 &nbsp;|&nbsp; Inputs: each individual fish from FISH_CATALOG',
        fc.property(
          fc.integer({ min: 0, max: FISH_CATALOG.length - 1 }),
          (idx) => {
            const singletonCatalog = [FISH_CATALOG[idx]];
            const result = selectFish(singletonCatalog);
            if (result.id !== FISH_CATALOG[idx].id) {
              throw new Error(
                `Expected id "${FISH_CATALOG[idx].id}" but got "${result.id}" ` +
                `from a single-item catalog.`
              );
            }
          }
        )
      );

      // ════════════════════════════════════════════════════════════════════
      // Property 9d — selectFish works with the full catalog (no subset);
      //               result must exist in FISH_CATALOG.
      // ════════════════════════════════════════════════════════════════════
      runProperty(
        'Property 9d — Full-catalog call always returns a catalog member',
        'Validates: Requirements 5.2 &nbsp;|&nbsp; Runs: 200 &nbsp;|&nbsp; Inputs: the complete FISH_CATALOG',
        fc.property(
          fc.constant(null), // dummy; we just want 200 calls
          () => {
            const result = selectFish(FISH_CATALOG);
            if (result === null || result === undefined) {
              throw new Error('selectFish(FISH_CATALOG) returned null/undefined');
            }
            const validIds = FISH_CATALOG.map(f => f.id);
            if (!validIds.includes(result.id)) {
              throw new Error(
                `selectFish returned unknown id "${result.id}"; ` +
                `valid ids: [${validIds.join(', ')}]`
              );
            }
          }
        )
      );

      // ── Final summary ────────────────────────────────────────────────────
      updateSummary();
      btnRun.disabled = false;
    }

    // Expose runTests so the onclick attribute can reach it from the global scope
    window.runTests = runTests;
  </script>
</body>
</html>
